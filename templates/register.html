<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — SportTalk</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-accent"></div>
    <div class="auth-card-body">

      <a href="/" style="font-size:0.8rem;color:var(--text-mute);display:inline-block;margin-bottom:1.5rem">← Retour à l'accueil</a>
      <div class="auth-logo">Sport<span>Talk</span></div>
      <p class="auth-subtitle">Crée ton compte et rejoins la communauté</p>

      {{if eq .Error "email_deja_utilise"}}
      <div class="alert alert-error">Cette adresse email est déjà utilisée.</div>
      {{end}}
      {{if eq .Error "erreur_serveur"}}
      <div class="alert alert-error">Une erreur est survenue. Réessaie.</div>
      {{end}}

      <form action="/register/submit" method="POST">
        <div class="form-group">
          <label class="form-label">Adresse email</label>
          <input type="email" name="email" class="form-control" placeholder="ton@email.com" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Nom d'utilisateur</label>
          <input type="text" name="username" class="form-control" placeholder="Ex : LeBossDesFoot" required>
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem">
          Créer mon compte
        </button>
      </form>

      <div class="auth-footer">
        Déjà un compte ? <a href="/login">Se connecter</a>
      </div>

    </div>
  </div>
</div>

</body>
</html>
