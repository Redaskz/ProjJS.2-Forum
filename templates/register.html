<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — ForumFoot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-box">
        <a href="/" class="auth-logo" style="display:block">⚽ ForumFoot</a>
        <div class="auth-sub">Rejoins la communauté football !</div>

        <form action="/register/submit" method="POST" class="auth-form">
            <div class="form-group">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" placeholder="Ton pseudo foot" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Adresse email</label>
                <input type="email" name="email" placeholder="email@exemple.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" placeholder="Min. 6 caractères" required minlength="6">
            </div>
            <button type="submit" class="auth-btn">Créer mon compte</button>
        </form>

        <div class="auth-divider">ou</div>

        <div class="auth-footer">
            Déjà inscrit ? <a href="/login">Se connecter</a>
        </div>
    </div>
</div>
</body>
</html>
