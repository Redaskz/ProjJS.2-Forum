<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — SportTalk</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card-accent"></div>
    <div class="auth-card-body">

      <a href="/" style="font-size:0.8rem;color:var(--text-mute);display:inline-block;margin-bottom:1.5rem">← Retour à l'accueil</a>
      <div class="auth-logo">Sport<span>Talk</span></div>
      <p class="auth-subtitle">Connecte-toi pour rejoindre le débat</p>

      {{if eq .Error "identifiants_incorrects"}}
      <div class="alert alert-error">Email ou mot de passe incorrect.</div>
      {{end}}

      <form action="/login/submit" method="POST">
        <div class="form-group">
          <label class="form-label">Adresse email</label>
          <input type="email" name="email" class="form-control" placeholder="ton@email.com" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem">
          Se connecter
        </button>
      </form>

      <div class="auth-footer">
        Pas encore de compte ? <a href="/register">S'inscrire</a>
      </div>

    </div>
  </div>
</div>

</body>
</html>
