<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — ForumFoot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-box">
        <a href="/" class="auth-logo" style="display:block">⚽ ForumFoot</a>
        <div class="auth-sub">Content de te revoir !</div>

        <form action="/login/submit" method="POST" class="auth-form">
            <div class="form-group">
                <label class="form-label">Adresse email</label>
                <input type="email" name="email" placeholder="email@exemple.com" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">Se connecter</button>
        </form>

        <div class="auth-divider">ou</div>

        <div class="auth-footer">
            Pas encore de compte ? <a href="/register">S'inscrire gratuitement</a>
        </div>
    </div>
</div>
</body>
</html>
