<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau post — SportTalk</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="header">
  <a href="/" class="header-logo">Sport<span>Talk</span></a>
  <nav class="header-nav">
    <a href="/">← Retour</a>
    <a href="/logout" class="btn btn-ghost">Déconnexion</a>
  </nav>
</header>

<div style="max-width:680px;margin:2rem auto;padding:0 1.5rem">
  <div class="form-card">
    <div class="form-title">Nouveau post</div>
    <form action="/post/create/submit" method="POST" enctype="multipart/form-data">

      <div class="form-group">
        <label class="form-label">Titre *</label>
        <input type="text" name="title" class="form-control" placeholder="Ex : PSG vs Real Madrid — Qui va gagner ?" required>
      </div>

      <div class="form-group">
        <label class="form-label">Contenu *</label>
        <textarea name="content" class="form-control" placeholder="Développe ton analyse, ton pronostic, ta réaction..." rows="6" required></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Image (optionnel)</label>
        <div class="file-input-wrap">
          <input type="file" name="image" accept="image/jpeg,image/png,image/gif">
          <div class="file-input-label">📷 Cliquer pour ajouter une image</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Catégories *</label>
        <div class="cat-checkboxes">
          {{range .Categories}}
          <label class="cat-check-label">
            <input type="checkbox" name="categories" value="{{.ID}}">
            {{.Name}}
          </label>
          {{end}}
        </div>
      </div>

      <div style="display:flex;gap:0.75rem;margin-top:1.25rem">
        <button type="submit" class="btn btn-primary">Publier</button>
        <a href="/" class="btn btn-ghost">Annuler</a>
      </div>

    </form>
  </div>
</div>
</body>
</html>
